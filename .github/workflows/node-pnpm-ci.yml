name: Node + pnpm CI (reusable)

# Reusable CI workflow for pnpm-based Node projects (NestJS, Vite,
# Astro, monorepos). Skeleton runs: checkout -> pnpm -> Node -> install,
# then opinionated default steps for pre-check / format / lint /
# typecheck / build / test. Each step is opt-out by setting its input
# to an empty string.
#
# Consumer repos call this with:
#   uses: tinbee/ci-workflows/.github/workflows/node-pnpm-ci.yml@v1

on:
  workflow_call:
    inputs:
      node_version_file:
        description: "Path to file containing Node version (e.g., .nvmrc). Single source of truth shared with local dev. Pass empty string to use `node_version` literal instead."
        type: string
        default: ".nvmrc"
      node_version:
        description: "Node version literal (e.g., '24'). Only used when node_version_file is empty."
        type: string
        default: "24"
      install_command:
        description: "Install step. Empty to skip (rare)."
        type: string
        default: "pnpm install --frozen-lockfile"
      pre_check_command:
        description: "Optional pre-check step run after install, before format/lint/typecheck. Multi-line bash allowed. Use for code generation (Prisma generate, GraphQL codegen, OpenAPI client gen). Empty to skip."
        type: string
        default: ""
      format_check_command:
        description: "Format check command. Empty to skip."
        type: string
        default: "pnpm format:check"
      lint_command:
        description: "Lint command. Empty to skip."
        type: string
        default: "pnpm lint"
      typecheck_command:
        description: "Typecheck command. Empty to skip."
        type: string
        default: "pnpm -r typecheck"
      build_command:
        description: "Build command. Empty to skip."
        type: string
        default: "pnpm -r build"
      test_command:
        description: "Test command. Empty to skip."
        type: string
        default: "pnpm -r test"
      coverage_command:
        description: "Coverage test command, run INSTEAD of test_command on pushes to the repo's default branch (typically right after a PR merges). Use to produce coverage reports as post-merge evidence. Empty (default) disables the coverage run entirely — test_command then runs on every trigger. Requires the caller to trigger on `push` to the default branch for this to fire."
        type: string
        default: ""
      coverage_artifact_path:
        description: "Multi-line glob paths uploaded as the coverage artifact after a coverage run (e.g. packages/*/coverage). Empty (default) skips the upload. Only consulted when coverage_command runs on a default-branch push."
        type: string
        default: ""
      coverage_artifact_name:
        description: "Name of the uploaded coverage artifact."
        type: string
        default: "coverage"
      coverage_retention_days:
        description: "Retention period (in days) for the uploaded coverage artifact."
        type: number
        default: 14
      env_json:
        description: 'JSON object of env vars exported to all subsequent steps via $GITHUB_ENV. Example: {"DATABASE_URL":"postgresql://ci:ci@localhost:5432/ci","VITE_API_URL":"https://ci.example"}. Use for CI-only placeholder values.'
        type: string
        default: "{}"
      timeout_minutes:
        description: "Job timeout in minutes."
        type: number
        default: 15
      turbo_api:
        description: "Turbo Remote Cache API URL (typically vars.TURBO_API, e.g. https://cache.example.com). Empty (default) runs without remote cache."
        type: string
        default: ""
      turbo_team:
        description: "Turbo Remote Cache team slug (typically vars.TURBO_TEAM). Empty (default) runs without remote cache."
        type: string
        default: ""
    secrets:
      turbo_token:
        description: "Turbo Remote Cache token (secrets.TURBO_TOKEN). Optional — omit to run without remote cache. Must be a secret (can't ride in env_json, which is a `with:` input)."
        required: false

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    # Turbo Remote Cache config, exported to every step. All optional —
    # when unset (the common case) the empty values are equivalent to
    # "no remote cache" and turbo builds locally. TURBO_TOKEN is a secret;
    # TURBO_API/TURBO_TEAM are non-sensitive (vars). They live here rather
    # than in env_json because env_json is a `with:` input and the secrets
    # context can't cross that boundary.
    env:
      TURBO_API: ${{ inputs.turbo_api }}
      TURBO_TEAM: ${{ inputs.turbo_team }}
      TURBO_TOKEN: ${{ secrets.turbo_token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set env from env_json input
        if: inputs.env_json != '{}' && inputs.env_json != ''
        shell: bash
        env:
          ENV_JSON: ${{ inputs.env_json }}
        run: |
          set -euo pipefail
          # Export each key/value from the JSON object into $GITHUB_ENV
          # so subsequent steps see them as plain environment variables.
          echo "$ENV_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      # Two setup-node steps gated on node_version_file because the
      # `node-version-file:` and `node-version:` inputs are mutually
      # exclusive (specifying both errors out).
      - name: Setup Node (from file)
        if: inputs.node_version_file != ''
        uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.node_version_file }}
          cache: pnpm

      - name: Setup Node (from literal)
        if: inputs.node_version_file == ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install dependencies
        if: inputs.install_command != ''
        shell: bash
        run: ${{ inputs.install_command }}

      - name: Pre-check (codegen, schema generation, etc.)
        if: inputs.pre_check_command != ''
        shell: bash
        run: ${{ inputs.pre_check_command }}

      - name: Format check
        if: inputs.format_check_command != ''
        shell: bash
        run: ${{ inputs.format_check_command }}

      - name: Lint
        if: inputs.lint_command != ''
        shell: bash
        run: ${{ inputs.lint_command }}

      - name: Typecheck
        if: inputs.typecheck_command != ''
        shell: bash
        run: ${{ inputs.typecheck_command }}

      - name: Build
        if: inputs.build_command != ''
        shell: bash
        run: ${{ inputs.build_command }}

      # Plain test run on every trigger EXCEPT a coverage-eligible push
      # to the default branch. The negative guard prevents running the
      # suite twice (plain + coverage) on post-merge pushes when the
      # caller has opted into coverage.
      - name: Test
        if: >-
          inputs.test_command != '' &&
          !(inputs.coverage_command != '' &&
            github.event_name == 'push' &&
            github.ref_name == github.event.repository.default_branch)
        shell: bash
        run: ${{ inputs.test_command }}

      # On a push to the default branch (typically a PR merge), run the
      # coverage command in place of the plain test command. Inert unless
      # the caller sets coverage_command AND triggers on push to default.
      - name: Test (with coverage)
        if: >-
          inputs.coverage_command != '' &&
          github.event_name == 'push' &&
          github.ref_name == github.event.repository.default_branch
        shell: bash
        run: ${{ inputs.coverage_command }}

      # Upload coverage reports as a downloadable artifact (evidence only;
      # not a gate). Same default-branch-push condition; additionally
      # gated on coverage_artifact_path being set.
      - name: Upload coverage
        if: >-
          inputs.coverage_artifact_path != '' &&
          github.event_name == 'push' &&
          github.ref_name == github.event.repository.default_branch
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.coverage_artifact_name }}
          path: ${{ inputs.coverage_artifact_path }}
          if-no-files-found: warn
          retention-days: ${{ inputs.coverage_retention_days }}
