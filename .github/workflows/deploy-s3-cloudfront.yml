name: Deploy to S3 + CloudFront (reusable)

# Reusable workflow for "deploy a static site to AWS S3 + CloudFront."
# Defaults are SPA-first (Vite/Astro/Next-style hashed assets) — see
# `cache_control_overrides` and `invalidation_paths` defaults below.
# Legacy static-site consumers (root-served *.html, *.ics, etc.) should
# explicitly pass empty cache overrides and `invalidation_paths: "/*"`.
#
# Consumer repos call this with:
#   uses: tinbee/ci-workflows/.github/workflows/deploy-s3-cloudfront.yml@v1
# See README.md for the full caller shape and migration examples.

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node version passed to actions/setup-node."
        type: string
        default: "24"
      build_command:
        description: "Optional pre-deploy script. Multi-line bash allowed. Runs after Node/pnpm setup, before AWS auth."
        type: string
        default: ""
      source_dir:
        description: "Directory to sync to S3. Defaults to dist/ (Vite/SSG convention)."
        type: string
        default: "dist/"
      sync_excludes:
        description: "Newline-separated list of S3 sync --exclude patterns."
        type: string
        default: ""
      content_type_fixups:
        description: 'JSON array of per-extension Content-Type overrides. Example: [{"ext":".ics","content_type":"text/calendar; charset=utf-8","cache_control":"public, max-age=3600"}]'
        type: string
        default: ""
      invalidation_paths:
        description: "Space-separated CloudFront invalidation paths. Default `/ /index.html` is the SPA pattern (hashed assets never need invalidating). Legacy static sites with root-served HTML/other files should pass `/*` to invalidate everything."
        type: string
        default: "/ /index.html"
      cache_control_overrides:
        description: 'JSON array of per-path-pattern Cache-Control overrides, applied as separate `aws s3 sync` passes before the default sync. Each entry: {"path_pattern":"assets/*","cache_control":"public, max-age=31536000, immutable"}. Default targets Vite/SPA hashed `assets/*` directory. Pass empty string to disable multi-pass sync entirely.'
        type: string
        default: '[{"path_pattern":"assets/*","cache_control":"public, max-age=31536000, immutable"}]'
      default_cache_control:
        description: "Cache-Control header for files NOT matched by any cache_control_overrides entry. Default is SPA-friendly (force revalidation on every request). Pass empty string to omit the header entirely (S3 default behavior — no Cache-Control sent)."
        type: string
        default: "public, max-age=0, must-revalidate"
      env_json:
        description: 'JSON object of env vars exported to all subsequent steps via $GITHUB_ENV. Use for build-time config (e.g. VITE_*, NEXT_PUBLIC_*). Example: {"VITE_API_URL":"https://api.example.com","VITE_SITE_ID":"abc123"}.'
        type: string
        default: "{}"
      aws_region:
        description: "AWS region (e.g. us-east-1). MUST come from vars/literal — secrets context is forbidden in `with:`."
        type: string
        required: true
      setup_pnpm:
        description: "Whether to set up pnpm + cache: pnpm. Disable for consumers without a package.json or packageManager field (e.g. pre-SSG static sites that only run bare node scripts)."
        type: boolean
        default: true
    secrets:
      role_to_assume:
        description: "IAM role ARN to assume via OIDC."
        required: true
      s3_bucket:
        description: "Target S3 bucket name (no s3:// prefix)."
        required: true
      cloudfront_distribution:
        description: "CloudFront distribution ID."
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Validate required inputs and secrets
        # Fail fast with a clear, named error when a required value is
        # empty. `required: true` on a workflow_call input/secret only
        # checks that the caller PASSED it — NOT that it is non-empty. An
        # unset repo variable (e.g. a missing vars.AWS_REGION) or unset
        # secret resolves to "" and would otherwise slip through to a
        # cryptic failure deep inside the AWS steps. This step makes the
        # reusable workflow the source of correctness rather than trusting
        # each consumer to be configured right.
        shell: bash
        env:
          AWS_REGION_IN: ${{ inputs.aws_region }}
          ROLE_TO_ASSUME: ${{ secrets.role_to_assume }}
          S3_BUCKET: ${{ secrets.s3_bucket }}
          CLOUDFRONT_DISTRIBUTION: ${{ secrets.cloudfront_distribution }}
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${AWS_REGION_IN}" ]; then
            echo "::error::Input 'aws_region' is empty. Callers read it from the AWS_REGION repo variable (vars.AWS_REGION) — set that variable on the calling repo, usually via its Terraform module. A missing repo variable resolves to an empty string, which 'required: true' does not catch."
            missing=1
          fi
          if [ -z "${ROLE_TO_ASSUME}" ]; then
            echo "::error::Secret 'role_to_assume' is empty. Set the repo secret the caller maps into it (commonly AWS_CLOUDFRONT_ROLE_TO_ASSUME)."
            missing=1
          fi
          if [ -z "${S3_BUCKET}" ]; then
            echo "::error::Secret 's3_bucket' is empty. Set the repo secret the caller maps into it (commonly AWS_S3_BUCKET)."
            missing=1
          fi
          if [ -z "${CLOUDFRONT_DISTRIBUTION}" ]; then
            echo "::error::Secret 'cloudfront_distribution' is empty. Set the repo secret the caller maps into it (commonly AWS_CLOUDFRONT_DISTRIBUTION_ID)."
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            echo "::error::Aborting before any AWS calls — one or more required inputs/secrets are empty (see annotations above)."
            exit 1
          fi
          echo "All required inputs and secrets are present."

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        # v6 = Node 24 native runtime + pnpm v11 support. Earlier v4 ran
        # on Node 20 and required FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 at
        # workflow level — no longer needed with v6.
        if: inputs.setup_pnpm
        uses: pnpm/action-setup@v6

      # Two setup-node steps gated on `setup_pnpm` because the `cache:`
      # input doesn't accept a dynamic empty-string fallback — only one
      # of npm/pnpm/yarn or the input must be omitted entirely.
      - name: Setup Node (with pnpm cache)
        if: inputs.setup_pnpm
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Setup Node (no cache)
        if: ${{ !inputs.setup_pnpm }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}

      - name: Set env from env_json input
        if: inputs.env_json != '{}' && inputs.env_json != ''
        shell: bash
        env:
          ENV_JSON: ${{ inputs.env_json }}
        run: |
          set -euo pipefail
          # Export each key/value from the JSON object into $GITHUB_ENV
          # so subsequent steps (including Build) see them as plain env.
          echo "$ENV_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Build
        if: inputs.build_command != ''
        shell: bash
        run: ${{ inputs.build_command }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Sync to S3 (multi-pass with cache-control overrides)
        shell: bash
        env:
          BUCKET: ${{ secrets.s3_bucket }}
          SOURCE: ${{ inputs.source_dir }}
          EXCLUDES: ${{ inputs.sync_excludes }}
          OVERRIDES: ${{ inputs.cache_control_overrides }}
          DEFAULT_CC: ${{ inputs.default_cache_control }}
        run: |
          set -euo pipefail

          # User-supplied --exclude patterns apply to EVERY sync pass
          # (override passes use them on top of their own --exclude "*").
          user_excludes=()
          if [ -n "$EXCLUDES" ]; then
            while IFS= read -r line; do
              line=$(echo "$line" | xargs)
              [ -z "$line" ] && continue
              user_excludes+=(--exclude "$line")
            done <<< "$EXCLUDES"
          fi

          # Multi-pass: for each override entry, run a targeted sync that
          # only matches its path_pattern, with the override's
          # Cache-Control. The final default sync excludes all override
          # patterns so each slice is owned exclusively by one pass.
          override_excludes=()
          if [ -n "$OVERRIDES" ] && [ "$OVERRIDES" != "[]" ]; then
            count=$(echo "$OVERRIDES" | jq 'length')
            for i in $(seq 0 $((count - 1))); do
              pattern=$(echo "$OVERRIDES" | jq -r ".[$i].path_pattern")
              cc=$(echo "$OVERRIDES" | jq -r ".[$i].cache_control")
              echo "Override pass: pattern=$pattern cache_control=$cc"
              aws s3 sync "$SOURCE" "s3://${BUCKET}/" --delete \
                "${user_excludes[@]}" \
                --exclude "*" \
                --include "$pattern" \
                --cache-control "$cc"
              override_excludes+=(--exclude "$pattern")
            done
          fi

          # Final default-cache pass: everything not matched by an override.
          cc_flag=()
          if [ -n "$DEFAULT_CC" ]; then
            cc_flag=(--cache-control "$DEFAULT_CC")
          fi
          echo "Default pass: cache_control=${DEFAULT_CC:-<none>}"
          aws s3 sync "$SOURCE" "s3://${BUCKET}/" --delete \
            "${user_excludes[@]}" \
            "${override_excludes[@]}" \
            "${cc_flag[@]}"

      - name: Apply Content-Type fixups
        if: inputs.content_type_fixups != ''
        shell: bash
        env:
          BUCKET: ${{ secrets.s3_bucket }}
          SOURCE: ${{ inputs.source_dir }}
          FIXUPS: ${{ inputs.content_type_fixups }}
        run: |
          set -euo pipefail
          count=$(echo "$FIXUPS" | jq 'length')
          for i in $(seq 0 $((count - 1))); do
            ext=$(echo "$FIXUPS" | jq -r ".[$i].ext")
            ctype=$(echo "$FIXUPS" | jq -r ".[$i].content_type")
            ccontrol=$(echo "$FIXUPS" | jq -r ".[$i].cache_control // empty")
            shopt -s nullglob
            for f in "$SOURCE"/*"$ext"; do
              name=$(basename "$f")
              extra=()
              if [ -n "$ccontrol" ]; then
                extra+=(--cache-control "$ccontrol")
              fi
              aws s3 cp "$f" "s3://${BUCKET}/$name" \
                --content-type "$ctype" \
                "${extra[@]}" \
                --metadata-directive REPLACE
            done
          done

      - name: Invalidate CloudFront
        shell: bash
        env:
          DIST_ID: ${{ secrets.cloudfront_distribution }}
          PATHS: ${{ inputs.invalidation_paths }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086  # PATHS is intentionally word-split for multiple invalidation paths
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths $PATHS \
            --query 'Invalidation.Id' \
            --output text)
          echo "Created invalidation: ${INV_ID}"
          aws cloudfront wait invalidation-completed \
            --distribution-id "${DIST_ID}" \
            --id "${INV_ID}"
          echo "Invalidation complete."
